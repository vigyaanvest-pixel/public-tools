<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VigyaanVest Icon Preview</title>
<style>
  body { background: #0d0f14; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; gap: 32px; flex-wrap: wrap; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #8b92a8; font-size: 11px; }
  img { image-rendering: pixelated; }
</style>
</head>
<body>
  <div class="card">
    <img src="icon.svg" width="128" height="128">
    <span>128×128</span>
  </div>
  <div class="card">
    <img src="icon.svg" width="48" height="48">
    <span>48×48</span>
  </div>
  <div class="card">
    <img src="icon.svg" width="32" height="32">
    <span>32×32</span>
  </div>
  <div class="card">
    <img src="icon.svg" width="16" height="16">
    <span>16×16</span>
  </div>
</body>
</html>
