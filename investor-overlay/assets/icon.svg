<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#grad)"/>
  <!-- V-shape: chart line going down then up, suggesting a recovery / uptrend -->
  <polyline
    points="24,42 64,88 104,42"
    fill="none"
    stroke="#0d0f14"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Small upward tick at end suggesting continued uptrend -->
  <line
    x1="104" y1="42" x2="116" y2="26"
    stroke="#0d0f14"
    stroke-width="13"
    stroke-linecap="round"
  />
</svg>
